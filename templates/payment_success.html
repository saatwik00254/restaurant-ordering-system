<!DOCTYPE html>
<html>
<head>
    <title>Payment Successful</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#4CAF50,#2ecc71);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            width:420px;
            text-align:center;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
            animation:fadeIn 0.7s ease-in-out;
        }

        .success-icon{
            font-size:70px;
            color:#2ecc71;
        }

        h1{
            margin-top:10px;
            color:#333;
        }

        p{
            color:#666;
            font-size:16px;
        }

        .status{
            background:#eafaf1;
            padding:10px;
            border-radius:8px;
            margin:15px 0;
            font-weight:600;
            color:#27ae60;
        }

        .btn{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#2ecc71;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#27ae60;
            transform:scale(1.05);
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(20px);}
            to{opacity:1; transform:translateY(0);}
        }
    </style>
</head>

<body>
    <script>
setTimeout(function(){
    window.location="/orders";
},4000);
</script>

    <div class="card">
        <div class="success-icon">✔</div>

        <h1>Payment Successful</h1>

        <p>Your order has been placed successfully.</p>

        <div class="status">
            Order Status: Preparing 🍳
        </div>

        <br>

        <a href="/orders">
            <button class="btn">View My Orders</button>
        </a>

    </div>

</body>
</html>
