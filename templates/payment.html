<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="payment-bg">

<div class="center-box">
    <div class="glass-card text-center">

        <h2 class="mb-3">💳 Secure Payment</h2>

        <img src="https://cdn-icons-png.flaticon.com/512/2331/2331970.png"
             width="120" class="mb-3">

        <p>Your delicious food is waiting 🍕🍔</p>

        <a href="/confirm_payment" class="btn btn-success w-100 mb-2">
            Pay Now
        </a>

        <a href="/" class="btn btn-secondary w-100">
            Cancel
        </a>
        <h2>Secure Payment Gateway</h2>

<form action="/confirm_payment" method="POST">

    <label>Select Payment Method:</label><br><br>

    <input type="radio" name="method" value="UPI" required> UPI<br>
    <input type="radio" name="method" value="Card"> Debit/Credit Card<br>
    <input type="radio" name="method" value="NetBanking"> Net Banking<br>
    <input type="radio" name="method" value="COD"> Cash on Delivery<br><br>

    <button type="submit">Proceed to Pay</button>

</form>
    </div>
</div>

</body>
</html>
