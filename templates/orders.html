<!DOCTYPE html>
<html>
<head>
    <title>Your Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-bg">

<div class="container mt-5">
    <h2 class="text-center text-white mb-4">🧾 Your Order History</h2>

    {% if orders %}
        <div class="row">
            {% for order in orders %}
            <div class="col-md-4 mb-3">
                <div class="glass-card">

                    <h5>Order #{{ loop.index }}</h5>

                    <p><b>Items:</b></p>
                    <ul>
                        {% for item in order["items"] %}

                            <li>{{ item }}</li>
                        {% endfor %}
                    </ul>

                    <p>
                        <b>Status:</b>
                        <span class="text-success">
                            {{ order.status if order.status else "Placed" }}
                        </span>
                    </p>

                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-center text-white">No orders yet.</p>
    {% endif %}

    <div class="text-center mt-4">
        <a href="/" class="btn btn-light">⬅ Back to Menu</a>
    </div>
</div>

</body>
</html>
